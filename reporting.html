<!doctype html>
<html lang="en">
<head>
  <script>
    (function(){try{var t=localStorage.getItem('portfolioTheme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sessions Garden</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <link rel="stylesheet" href="./assets/app.css" />
</head>
<body data-nav="reporting">
  <div class="app-shell">
    <div class="container">
      <header class="app-header">
        <div class="brand">
          <div class="brand-mark">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <!-- Leaf shape: a pointed oval leaf -->
              <path d="M12 2 C6 2 3 7 3 12 C3 17 7 21 12 21 C17 21 21 17 21 12 C21 7 18 2 12 2 Z" fill="currentColor" stroke="none" opacity="0.9"/>
              <!-- Stem/swirl: a curved line from center to bottom -->
              <path d="M12 21 C12 21 10 19 9 17" stroke="currentColor" fill="none" stroke-width="1.5"/>
              <!-- Center vein -->
              <line x1="12" y1="6" x2="12" y2="17" stroke="white" stroke-width="1" opacity="0.5"/>
            </svg>
          </div>
          <div>
            <div class="brand-title">Sessions Garden</div>
            <div class="brand-subtitle">Your private practice journal</div>
          </div>
        </div>
        <div id="nav-placeholder"></div>
        <div class="header-actions">
          <select id="languageSelect" class="select" aria-label="Language">
            <option value="en">English</option>
            <option value="he">עברית</option>
          </select>
        </div>
      </header>

      <section class="card">
        <div class="section-title" data-i18n="reporting.title">Reporting</div>
        <div class="helper-text" data-i18n="reporting.subtitle">Key Metrics</div>
      </section>

      <section class="stat-grid" style="margin-top:1.5rem;">
        <div class="stat-card">
          <div class="stat-value" id="reportTotalClients">0</div>
          <div class="stat-label" data-i18n="reporting.totalClients">Total Clients</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="reportTotalSessions">0</div>
          <div class="stat-label" data-i18n="reporting.totalSessions">Total Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="reportAvgIssues">-</div>
          <div class="stat-label" data-i18n="reporting.avgIssues">Avg Issues per Session</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="reportAvgBefore">-</div>
          <div class="stat-label" data-i18n="reporting.avgBefore">Avg Severity (Before)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="reportAvgAfter">-</div>
          <div class="stat-label" data-i18n="reporting.avgAfter">Avg Severity (After)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="reportHeartWall">0</div>
          <div class="stat-label" data-i18n="reporting.heartWallCleared">Heart-Wall Cleared Sessions</div>
        </div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="./assets/i18n.js"></script>
  <script src="./assets/db.js"></script>
  <script src="./assets/app.js"></script>
  <script src="./assets/reporting.js"></script>
</body>
</html>
