<!doctype html>
<html lang="en" dir="ltr">
<head>
  <script>
    (function(){try{var t=localStorage.getItem('portfolioTheme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
  </script>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/branding/favicon-32.png">
  <link rel="icon" type="image/x-icon" href="./assets/branding/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/branding/icon-180.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.lemonsqueezy.com; font-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Impressum — Sessions Garden</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <link rel="stylesheet" href="./assets/app.css" />
  <link rel="stylesheet" href="./assets/globe-lang.css" />
  <link rel="manifest" href="./manifest.json" />
  <style>
    .legal-page { min-height: 100vh; display: flex; flex-direction: column; background: var(--color-bg); color: var(--color-text); }
    .legal-topbar { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--color-border); background: var(--color-surface); }
    .legal-topbar-brand { font-weight: 600; font-size: 1.125rem; color: var(--color-primary); text-decoration: none; flex: 1; display: flex; align-items: center; gap: 0.6rem; }
    .legal-back-link { font-size: 0.875rem; color: var(--color-primary); text-decoration: none; }
    .legal-back-link:hover { text-decoration: underline; }
    .legal-content { flex: 1; max-width: 720px; margin: 2rem auto; padding: 0 1.5rem; line-height: 1.7; }
    .legal-content h2 { margin-top: 0; color: var(--color-primary); }
    .legal-content h3 { margin-top: 1.5rem; }
    .legal-content pre { font-family: inherit; white-space: pre-wrap; margin: 0; }
    .legal-footer { text-align: center; padding: 1.5rem; border-top: 1px solid var(--color-border); font-size: 0.875rem; display: flex; justify-content: center; gap: 1.5rem; }
    .legal-footer a { color: var(--color-primary); text-decoration: none; }
    .legal-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="legal-page">
    <div class="legal-topbar">
      <a class="legal-topbar-brand" href="./landing.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true" style="color:var(--color-primary)">
          <path d="M12 2 C14 2 18 6 18 11 C18 17 15 21 12 22 C9 21 6 17 6 11 C6 6 10 2 12 2 Z" fill="currentColor" opacity="0.85"/>
          <path d="M12 3 L12 21" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5" fill="none"/>
          <path d="M12 7 Q15 9 16 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
          <path d="M12 7 Q9 9 8 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
          <path d="M12 12 Q15 14 16 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
          <path d="M12 12 Q9 14 8 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
        </svg>
        Sessions Garden
      </a>
      <div id="globe-container"></div>
      <a id="back-link" class="legal-back-link" href="./landing.html">Back to home</a>
    </div>
    <div class="legal-content">
      <h2 id="impressum-heading">Impressum</h2>
      <h3 id="impressum-angaben">Angaben gemäß § 5 DDG</h3>
      <pre id="impressum-placeholder" style="font-family:inherit;margin:0;white-space:pre-wrap;">[YOUR_BUSINESS_NAME]
[YOUR_STREET_ADDRESS]
[YOUR_CITY_POSTAL_CODE]

Kontakt:
E-Mail: [YOUR_BUSINESS_EMAIL]
Telefon: [YOUR_PHONE_NUMBER]

Steuernummer: [YOUR_TAX_ID]</pre>
    </div>
  </div>
  <footer class="legal-footer" id="legal-footer">
    <a id="footer-terms-link" href="./disclaimer.html?readonly=true">Terms of Use</a>
    <a id="footer-impressum-link" href="./impressum.html">Impressum</a>
    <a id="footer-privacy-link" href="./datenschutz.html">Privacy Policy</a>
  </footer>
  <script src="./assets/globe-lang.js"></script>
  <script>
    (function() {
      var TITLES = { en: 'Impressum', he: 'אודות / Impressum', de: 'Impressum', cs: 'Impressum' };
      var BACK = { en: 'Back to home', he: 'חזרה לדף הבית', de: 'Zurück zur Startseite', cs: 'Zpět na hlavní stránku' };
      var ANGABEN = { en: 'Information pursuant to DDG § 5', he: 'פרטים בהתאם ל-DDG סעיף 5', de: 'Angaben gemäß § 5 DDG', cs: 'Údaje podle § 5 DDG' };
      function detectLang() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('lang');
        if (p && TITLES[p]) return p;
        try { var s = localStorage.getItem('portfolioLang'); if (s && TITLES[s]) return s; } catch(e) {}
        var nav = (navigator.language || '').split('-')[0].toLowerCase();
        return TITLES[nav] ? nav : 'en';
      }
      var lang = detectLang();
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
      var h = document.getElementById('impressum-heading');
      if (h) h.textContent = TITLES[lang];
      var a = document.getElementById('impressum-angaben');
      if (a) a.textContent = ANGABEN[lang];
      var b = document.getElementById('back-link');
      if (b) b.textContent = BACK[lang];
      // Footer links
      var FL = { en: { t: 'Terms of Use', i: 'Impressum', p: 'Privacy Policy' }, he: { t: 'תנאי שימוש', i: 'אודות', p: 'מדיניות פרטיות' }, de: { t: 'Nutzungsbedingungen', i: 'Impressum', p: 'Datenschutzerklärung' }, cs: { t: 'Podmínky použití', i: 'O nás', p: 'Zásady ochrany osobních údajů' } };
      var fl = FL[lang] || FL.en;
      var fT = document.getElementById('footer-terms-link'); if (fT) { fT.textContent = fl.t; fT.href = './disclaimer.html?readonly=true&lang=' + lang; }
      var fI = document.getElementById('footer-impressum-link'); if (fI) { fI.textContent = fl.i; fI.href = './impressum.html?lang=' + lang; }
      var fP = document.getElementById('footer-privacy-link'); if (fP) { fP.textContent = fl.p; fP.href = './datenschutz.html?lang=' + lang; }
      initGlobeLang({
        containerId: 'globe-container',
        currentLang: lang,
        onLangChange: function(newLang) {
          try { localStorage.setItem('portfolioLang', newLang); } catch(e) {}
          window.location.search = '?lang=' + newLang;
        }
      });
    })();
  </script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(e){console.warn('SW registration failed:',e)});});}</script>
</body>
</html>
