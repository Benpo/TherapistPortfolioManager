name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docs gate (fail-closed)
        run: |
          set -eu
          # The authoritative, unbypassable docs-rot gate. Mirrors the "Verify no
          # sensitive files" idiom (inline shell, loud echo, exit 1, no external
          # action). It runs the SAME scripts/docs-gate.js the local hook runs; only
          # the range differs.
          #
          # Range resolution (anchoring, three-way ls-remote branching, fail-closed
          # on any network/auth fault or unresolvable anchor — CR-01/WR-02) lives in
          # the SHARED, unit-tested scripts/ci-resolve-docs-range.sh so a stubbed-git
          # behavior test can drive every exit code. The resolver is checked out with
          # the repo (fetch-depth 0), so it is available here. It writes ONLY the
          # resolved range to stdout and exits non-zero on any fail-closed condition.
          range="$(sh scripts/ci-resolve-docs-range.sh)"
          count="$(git rev-list --count "$range")"
          echo "Docs gate range: $range ($count commit(s))"
          # A count of exactly 1 on a multi-commit push is the signature of the silent
          # bootstrap degradation — the range echo above makes it auditable in the log.
          node scripts/docs-gate.js --range "$range"

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy-staging
          # Include per D-08: _headers, *.html, assets/, manifest.json, sw.js
          cp _headers deploy-staging/
          cp _redirects deploy-staging/
          cp LICENSE deploy-staging/
          cp *.html deploy-staging/
          cp -r assets deploy-staging/
          cp manifest.json deploy-staging/
          cp sw.js deploy-staging/
          # Stamp the deploy token (D-02/D-04): replace the __BUILD_TOKEN__
          # placeholder in the STAGING copy of version.js with the git short-hash.
          # This makes INTEGRITY_TOKEN the commit short-hash in production, and
          # CACHE_NAME auto-derives from it. Single deliberate transform on the
          # staging copy only — NOT a bundler/build step. The committed
          # assets/version.js keeps its placeholder ('dev' fallback for file://).
          sed -i "s/'__BUILD_TOKEN__'/'${GITHUB_SHA::7}'/" deploy-staging/assets/version.js

      - name: Verify no sensitive files
        run: |
          # Ensure no dev/planning files leaked into deploy
          if [ -d "deploy-staging/.planning" ] || [ -d "deploy-staging/.claude" ] || [ -f "deploy-staging/CLAUDE.md" ] || [ -f "deploy-staging/.env" ]; then
            echo "ERROR: Sensitive files found in deploy-staging!"
            ls -la deploy-staging/
            exit 1
          fi
          echo "Deploy directory is clean."
          echo "HTML files:"
          ls deploy-staging/*.html | wc -l
          echo "Asset files:"
          ls deploy-staging/assets/ | wc -l

      - name: Push to deploy branch
        run: |
          cd deploy-staging
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b deploy
          git add -A
          # Full SHA (not ::7) so the next run's docs-gate anchor is unambiguous.
          git commit -m "Deploy from ${GITHUB_SHA}"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin deploy

      - name: Purge Cloudflare cache
        if: success()
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_PURGE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -q '"success":true' && echo "Cache purged" || echo "Cache purge failed (non-blocking)"
