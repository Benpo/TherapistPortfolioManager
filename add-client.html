<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Client</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <link rel="stylesheet" href="./assets/app.css" />
</head>
<body data-nav="addClient">
  <div class="app-shell">
    <div class="container">
      <header class="app-header">
        <div class="brand">
          <div class="brand-mark">EC</div>
          <div>
            <div class="brand-title" data-i18n="app.title">Emotion Code Portfolio</div>
            <div class="brand-subtitle" data-i18n="app.subtitle">Portfolio Manager</div>
          </div>
        </div>
        <nav class="app-nav">
          <a href="./index.html" data-nav="overview" data-i18n="nav.overview">Overview</a>
          <a href="./sessions.html" data-nav="sessions" data-i18n="nav.sessions">Sessions</a>
          <a href="./reporting.html" data-nav="reporting" data-i18n="nav.reporting">Reporting</a>
          <span class="nav-divider" aria-hidden="true"></span>
          <a href="./add-client.html" data-nav="addClient" data-i18n="nav.addClient">Add Client</a>
          <a href="./add-session.html" data-nav="addSession" data-i18n="nav.addSession">Add Session</a>
        </nav>
        <div class="header-actions">
          <select id="languageSelect" class="select" aria-label="Language">
            <option value="en">English</option>
            <option value="he">עברית</option>
          </select>
        </div>
      </header>

      <section class="card">
        <h2 class="section-title" data-i18n="client.title">Add New Client</h2>
        <form id="clientForm">
          <div class="form-grid">
            <div class="form-field">
              <label class="label" data-i18n="client.form.firstName">First Name *</label>
              <input class="input" id="clientFirstName" type="text" required data-i18n-placeholder="client.form.firstName.placeholder" placeholder="First name" />
            </div>
            <div class="form-field">
              <label class="label" data-i18n="client.form.lastInitial">Last Initial (Optional)</label>
              <input class="input" id="clientLastInitial" type="text" maxlength="1" data-i18n-placeholder="client.form.lastInitial.placeholder" placeholder="Last initial" />
            </div>
            <div class="form-field">
              <label class="label" data-i18n="client.form.age">Client Age</label>
              <input class="input" id="clientAge" type="number" min="0" data-i18n-placeholder="client.form.age.placeholder" placeholder="Age in years" />
            </div>
            <div class="form-field">
              <label class="label" data-i18n="client.form.email">Email</label>
              <input class="input" id="clientEmail" type="email" data-i18n-placeholder="client.form.email.placeholder" placeholder="name@email.com" />
            </div>
            <div class="form-field">
              <label class="label" data-i18n="client.form.phone">Phone</label>
              <input class="input" id="clientPhone" type="tel" data-i18n-placeholder="client.form.phone.placeholder" placeholder="Phone number" />
            </div>
            <div class="form-field">
              <label class="label" data-i18n="client.form.notes">Notes</label>
              <textarea class="textarea" id="clientNotes" data-i18n-placeholder="client.form.notes.placeholder" placeholder="Optional notes"></textarea>
            </div>
          </div>

          <div class="form-grid" style="margin-top:1.25rem;">
            <div class="form-field">
              <label class="label" data-i18n="client.form.photo">Client Photo (Optional)</label>
              <input class="input" id="clientPhoto" type="file" accept="image/*" capture="environment" />
              <img id="clientPhotoPreview" class="photo-preview is-hidden" alt="Client preview" />
            </div>
          </div>

          <div class="form-field" style="margin-top:1.25rem;">
            <label class="checkbox-field">
              <input type="checkbox" id="clientHeartWall" />
              <span data-i18n="client.form.heartWall">Is this a Heart-Wall Client?</span>
            </label>
          </div>

          <div class="form-field" style="margin-top:1.25rem;">
            <label class="label" data-i18n="client.form.type">Client Type</label>
            <div class="toggle-group" id="clientTypeGroup">
              <label class="toggle-card active" data-type="human">
                <input type="radio" name="clientType" value="human" checked />
                <span class="icon-badge">🧍</span>
                <span data-i18n="client.form.type.human">Human</span>
              </label>
              <label class="toggle-card" data-type="animal">
                <input type="radio" name="clientType" value="animal" />
                <span class="icon-badge">🐾</span>
                <span data-i18n="client.form.type.animal">Animal</span>
              </label>
            </div>
          </div>

          <div class="inline-actions" style="margin-top:1.5rem;">
            <button class="button icon-swap" type="submit">
              <span class="button-label" data-i18n="client.form.save">Save Client</span>
              <span class="button-icon" aria-hidden="true">&#128190;</span>
            </button>
            <button class="button secondary icon-swap" type="submit" id="saveAndSessionBtn">
              <span class="button-label" data-i18n="client.form.saveAndSession">Save &amp; Create First Session</span>
              <span class="button-icon" aria-hidden="true">&#128190; &#43; &#128197;</span>
            </button>
            <button class="button ghost" type="button" id="cancelBtn" data-i18n="client.form.cancel">Cancel</button>
            <button class="button danger icon-swap is-hidden" type="button" id="deleteClientBtn">
              <span class="button-label" data-i18n="client.form.delete">Delete Client</span>
              <span class="button-icon" aria-hidden="true">&#128465;</span>
            </button>
          </div>
        </form>
      </section>
    </div>
  </div>

  <div id="confirmModal" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
    <div class="modal-overlay"></div>
    <div class="modal-card confirm-card">
      <div id="confirmTitle" class="confirm-title"></div>
      <div id="confirmMessage" class="confirm-body"></div>
      <div class="modal-actions confirm-actions">
        <button class="button ghost" type="button" id="confirmCancelBtn" data-i18n="confirm.cancel">Cancel</button>
        <button class="button danger" type="button" id="confirmOkBtn" data-i18n="confirm.delete">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="./assets/i18n.js"></script>
  <script src="./assets/db.js"></script>
  <script src="./assets/app.js"></script>
  <script src="./assets/add-client.js"></script>
</body>
</html>
