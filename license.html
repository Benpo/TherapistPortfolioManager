<!doctype html>
<html lang="en" dir="ltr">
<head>
  <script>
    (function(){try{var t=localStorage.getItem('portfolioTheme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
  </script>
  <!-- No terms gate on license page — TOC is gated on app pages only -->
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/branding/favicon-32.png">
  <link rel="icon" type="image/x-icon" href="./assets/branding/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/branding/icon-180.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.lemonsqueezy.com; font-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activate — Sessions Garden</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <link rel="stylesheet" href="./assets/app.css" />
  <style>
    /* Ensure hidden attribute works even when CSS sets display */
    [hidden] { display: none !important; }

    /* -----------------------------------------------------------------------
       License page — scoped styles
       ----------------------------------------------------------------------- */

    .license-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      color: var(--color-text);
      padding: 2rem 1rem;
    }

    .license-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .license-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--color-primary);
      text-decoration: none;
    }

    .license-brand-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--color-text);
    }

    .license-heading {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .license-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      margin: 0;
    }

    .license-subtitle {
      font-size: 0.9rem;
      color: var(--color-text-muted, var(--color-text));
      opacity: 0.75;
      margin: 0;
    }

    .license-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .license-field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .license-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text);
    }

    .license-key-input {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      background: var(--color-bg);
      color: var(--color-text);
      width: 100%;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }

    .license-key-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 15%, transparent);
    }

    .license-activate-btn {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .license-activate-btn:hover:not(:disabled) {
      opacity: 0.88;
    }

    .license-activate-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .license-message {
      font-size: 0.875rem;
      padding: 0.625rem 0.875rem;
      border-radius: 0.5rem;
      line-height: 1.5;
    }

    .license-message--error {
      background: color-mix(in srgb, #ef4444 12%, transparent);
      color: #b91c1c;
      border: 1px solid color-mix(in srgb, #ef4444 30%, transparent);
    }

    [data-theme="dark"] .license-message--error {
      color: #fca5a5;
      background: color-mix(in srgb, #ef4444 18%, transparent);
    }

    .license-message--success {
      background: color-mix(in srgb, var(--color-primary) 12%, transparent);
      color: var(--color-primary);
      border: 1px solid color-mix(in srgb, var(--color-primary) 30%, transparent);
    }

    .license-purchase {
      text-align: center;
      font-size: 0.875rem;
      color: var(--color-text);
      opacity: 0.75;
    }

    .license-purchase a {
      color: var(--color-primary);
      text-decoration: underline;
      font-weight: 600;
    }

    .license-purchase a:hover {
      opacity: 0.8;
    }

    /* Activated view */
    .license-activated-view {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .license-status-badge {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      color: var(--color-success, #16a34a);
      font-size: 1.125rem;
      font-weight: 700;
      padding: 0.75rem 1rem;
      background: color-mix(in srgb, var(--color-success, #16a34a) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-success, #16a34a) 25%, transparent);
      border-radius: 0.625rem;
    }

    [data-theme="dark"] .license-status-badge {
      background: color-mix(in srgb, var(--color-success, #16a34a) 15%, transparent);
    }

    .license-key-display {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .license-key-display-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-muted, var(--color-text));
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .license-masked-key {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      padding: 0.5rem 0.75rem;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 0.375rem;
      color: var(--color-text-muted, var(--color-text));
    }

    .license-deactivate-btn {
      width: 100%;
      padding: 0.625rem 1rem;
      background: transparent;
      color: #b91c1c;
      border: 1px solid color-mix(in srgb, #ef4444 40%, transparent);
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .license-deactivate-btn:hover {
      background: color-mix(in srgb, #ef4444 8%, transparent);
      border-color: color-mix(in srgb, #ef4444 60%, transparent);
    }

    [data-theme="dark"] .license-deactivate-btn {
      color: #fca5a5;
    }

    .license-deactivate-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .license-deactivate-info {
      font-size: 0.8rem;
      color: var(--color-text-muted, var(--color-text));
      opacity: 0.6;
      text-align: center;
      margin: 0;
    }

    /* Custom confirmation dialog — per D-18: bold red consequence text */
    .license-confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }

    .license-confirm-dialog {
      background: var(--color-surface, #fff);
      border: 1px solid var(--color-border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    [data-theme="dark"] .license-confirm-dialog {
      background: var(--color-surface, #1e1e1e);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    .license-confirm-title {
      margin: 0 0 0.75rem 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-text);
    }

    .license-confirm-msg {
      margin: 0 0 1.25rem 0;
      font-size: 0.9rem;
      line-height: 1.5;
      color: #b91c1c;
      font-weight: 700;
    }

    [data-theme="dark"] .license-confirm-msg {
      color: #fca5a5;
    }

    .license-confirm-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .license-confirm-cancel {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--color-text);
    }

    .license-confirm-cancel:hover {
      background: var(--color-bg);
    }

    .license-confirm-yes {
      padding: 0.5rem 1rem;
      background: #b91c1c;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }

    .license-confirm-yes:hover {
      background: #991b1b;
    }

    /* Chrome container — populated by JS based on activation state */
    #license-chrome .legal-topbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
    }
    #license-chrome .legal-topbar-brand {
      font-weight: 600;
      font-size: 1.125rem;
      color: var(--color-primary);
      text-decoration: none;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    #license-chrome .legal-back-link {
      font-size: 0.875rem;
      color: var(--color-primary);
      text-decoration: none;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm, 4px);
    }
    #license-chrome .legal-back-link:hover {
      text-decoration: underline;
      color: var(--color-primary);
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="license-chrome"></div>
  <main class="license-page">
    <div class="license-card">

      <!-- Brand -->
      <a href="./index.html" class="license-brand" style="text-decoration:none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
          <path d="M12 2 C14 2 18 6 18 11 C18 17 15 21 12 22 C9 21 6 17 6 11 C6 6 10 2 12 2 Z" fill="currentColor" opacity="0.85"/>
          <path d="M12 3 L12 21" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5" fill="none"/>
          <path d="M12 7 Q15 9 16 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
          <path d="M12 7 Q9 9 8 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
          <path d="M12 12 Q15 14 16 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
          <path d="M12 12 Q9 14 8 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
        </svg>
        <span class="license-brand-title">Sessions Garden</span>
      </a>

      <!-- Heading -->
      <div class="license-heading">
        <h1 id="license-title" class="license-title">Activate Sessions Garden</h1>
        <p id="license-subtitle" class="license-subtitle">Enter your license key to unlock the app.</p>
      </div>

      <!-- Form -->
      <div class="license-form">
        <div class="license-field">
          <label id="license-key-label" class="license-label" for="license-key-input">License Key</label>
          <input
            id="license-key-input"
            class="license-key-input"
            type="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="XXXX-XXXX-XXXX-XXXX"
          />
        </div>

        <!-- Message area (hidden by default) -->
        <p id="license-message" class="license-message" hidden></p>

        <button id="license-activate-btn" class="license-activate-btn" type="button">
          Activate
        </button>
      </div>

      <!-- Purchase link -->
      <p class="license-purchase">
        <span id="license-purchase-text">Don't have a license key?</span>
        <br />
        <a id="license-purchase-link" href="./landing.html">Purchase Sessions Garden</a>
      </p>

      <!-- Activated view (shown when license is active) -->
      <div id="license-activated-view" class="license-activated-view" hidden>
        <div class="license-status-badge">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span id="license-status-text">Licensed</span>
        </div>

        <div class="license-key-display">
          <span class="license-key-display-label" id="license-display-label">License Key</span>
          <code id="license-masked-key" class="license-masked-key">XXXX-....-XXXX</code>
        </div>

        <button id="license-deactivate-btn" class="license-deactivate-btn" type="button">
          Deactivate This Browser
        </button>

        <p id="license-deactivate-info" class="license-deactivate-info">
          Frees one of your 2 activation slots.
        </p>
      </div>

      <!-- Deactivation confirmation dialog (per D-18: bold red warning text) -->
      <div id="license-confirm-overlay" class="license-confirm-overlay" hidden>
        <div class="license-confirm-dialog">
          <h3 id="license-confirm-title" class="license-confirm-title">Deactivate License?</h3>
          <p id="license-confirm-msg" class="license-confirm-msg">
            <!-- Consequence text rendered bold+red per D-18 -->
          </p>
          <div class="license-confirm-actions">
            <button id="license-confirm-cancel" class="license-confirm-cancel" type="button">Cancel</button>
            <button id="license-confirm-yes" class="license-confirm-yes" type="button">Yes, Deactivate</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="./assets/shared-chrome.js"></script>
  <script src="./assets/license.js"></script>
  <script>
    // Render context-aware chrome based on license state (D-11, D-12, D-13, LIVE-05)
    window.renderLicenseChrome = function renderLicenseChrome() {
      var chrome = document.getElementById('license-chrome');
      if (!chrome) return;

      var lang = (typeof getLicenseLang === 'function') ? getLicenseLang() : 'en';
      var strings = (typeof LICENSE_I18N !== 'undefined' && LICENSE_I18N[lang]) ? LICENSE_I18N[lang] : { backToApp: 'Back to app', backToHome: 'Back to home' };

      var logoSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true" style="color:var(--color-primary)"><path d="M12 2 C14 2 18 6 18 11 C18 17 15 21 12 22 C9 21 6 17 6 11 C6 6 10 2 12 2 Z" fill="currentColor" opacity="0.85"/><path d="M12 3 L12 21" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5" fill="none"/><path d="M12 7 Q15 9 16 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/><path d="M12 7 Q9 9 8 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/><path d="M12 12 Q15 14 16 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/><path d="M12 12 Q9 14 8 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/></svg>';

      var ctx = (typeof SharedChrome !== 'undefined') ? SharedChrome.getNavigationContext() : { isActivated: false, homeHref: './landing.html' };
      var backHref = ctx.isActivated ? './index.html' : './landing.html';
      var backText = ctx.isActivated ? strings.backToApp : strings.backToHome;

      chrome.innerHTML =
        '<div class="legal-topbar">' +
          '<a class="legal-topbar-brand" href="' + backHref + '">' + logoSvg + ' Sessions Garden</a>' +
          '<div class="legal-topbar-controls">' +
            '<a class="legal-back-link" href="' + backHref + '">' + backText + '</a>' +
            '<div id="licenseHeaderActions" class="header-actions"></div>' +
          '</div>' +
        '</div>';

      // Add dark mode toggle
      var actions = document.getElementById('licenseHeaderActions');
      if (actions) {
        // Theme toggle
        var themeBtn = document.createElement('button');
        themeBtn.type = 'button';
        themeBtn.className = 'header-control-btn theme-toggle';
        themeBtn.setAttribute('aria-label', 'Toggle dark mode');
        var isDark = function() { return document.documentElement.getAttribute('data-theme') === 'dark'; };
        var updateIcon = function() { themeBtn.textContent = isDark() ? '\u2600\ufe0f' : '\uD83C\uDF19'; };
        updateIcon();
        themeBtn.addEventListener('click', function() {
          var next = isDark() ? 'light' : 'dark';
          if (next === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
          else document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('portfolioTheme', next);
          updateIcon();
        });
        actions.appendChild(themeBtn);

        // Language popover
        var langContainer = document.createElement('div');
        langContainer.className = 'lang-selector';
        var globeBtn = document.createElement('button');
        globeBtn.type = 'button';
        globeBtn.className = 'header-control-btn lang-globe-btn';
        globeBtn.setAttribute('aria-label', 'Language');
        globeBtn.setAttribute('aria-expanded', 'false');
        globeBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>';

        var popover = document.createElement('div');
        popover.className = 'lang-popover';
        popover.setAttribute('role', 'listbox');
        popover.hidden = true;

        var langs = [
          { code: 'en', label: 'English' },
          { code: 'he', label: '\u05e2\u05d1\u05e8\u05d9\u05ea' },
          { code: 'de', label: 'Deutsch' },
          { code: 'cs', label: '\u010ce\u0161tina' }
        ];

        langs.forEach(function(l) {
          var opt = document.createElement('button');
          opt.type = 'button';
          opt.className = 'lang-option' + (l.code === lang ? ' active' : '');
          opt.setAttribute('role', 'option');
          opt.setAttribute('data-lang', l.code);
          opt.textContent = l.label;
          opt.addEventListener('click', function() {
            popover.hidden = true;
            globeBtn.setAttribute('aria-expanded', 'false');
            localStorage.setItem('portfolioLang', l.code);
            // Re-render license content + chrome inline (no reload needed)
            if (typeof window.applyLicenseLang === 'function') window.applyLicenseLang();
            if (typeof window.renderLicenseChrome === 'function') window.renderLicenseChrome();
            // Update active state in popover
            popover.querySelectorAll('.lang-option').forEach(function(o) {
              o.classList.toggle('active', o.getAttribute('data-lang') === l.code);
            });
          });
          popover.appendChild(opt);
        });

        globeBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          popover.hidden = !popover.hidden;
          globeBtn.setAttribute('aria-expanded', String(!popover.hidden));
        });
        document.addEventListener('click', function(e) {
          if (!popover.hidden && !globeBtn.contains(e.target) && !popover.contains(e.target)) {
            popover.hidden = true;
            globeBtn.setAttribute('aria-expanded', 'false');
          }
        });

        langContainer.appendChild(globeBtn);
        langContainer.appendChild(popover);
        actions.appendChild(langContainer);
      }

      // Render footer
      if (typeof SharedChrome !== 'undefined' && SharedChrome.renderFooter) {
        SharedChrome.renderFooter(document.querySelector('main') || document.body);
      }
    };
    window.renderLicenseChrome();
  </script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(e){console.warn('SW registration failed:',e)});});}</script>
</body>
</html>
