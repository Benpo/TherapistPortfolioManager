<!doctype html>
<html lang="en" dir="ltr">
<head>
  <script>
    (function(){try{var t=localStorage.getItem('portfolioTheme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
  </script>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/branding/favicon-32.png">
  <link rel="icon" type="image/x-icon" href="./assets/branding/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/branding/icon-180.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.lemonsqueezy.com; font-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terms of Use — Sessions Garden</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <link rel="stylesheet" href="./assets/app.css" />
  <link rel="stylesheet" href="./assets/globe-lang.css" />
  <link rel="manifest" href="./manifest.json" />
  <style>
    /* -----------------------------------------------------------------------
       Disclaimer page — scoped styles
       ----------------------------------------------------------------------- */

    .disclaimer-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
      color: var(--color-text);
    }

    .disclaimer-topbar {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .disclaimer-brand {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: inherit;
    }

    .disclaimer-brand-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    .disclaimer-back-link {
      font-size: 0.875rem;
      color: var(--color-primary);
      text-decoration: none;
    }

    .disclaimer-back-link:hover {
      text-decoration: underline;
    }

    .disclaimer-main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }

    .disclaimer-card {
      width: 100%;
      max-width: 740px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 2rem 2.25rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .disclaimer-heading {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-primary);
      margin: 0 0 0.5rem;
    }

    .disclaimer-subheading {
      font-size: 0.95rem;
      color: var(--color-text-muted);
      margin: 0 0 1.75rem;
    }

    .disclaimer-section {
      margin-bottom: 1.5rem;
    }

    .disclaimer-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      margin: 0 0 0.4rem;
    }

    .disclaimer-section-body {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--color-text-muted);
      margin: 0;
    }

    .disclaimer-divider {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 1.75rem 0;
    }

    .disclaimer-checkbox-area {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .disclaimer-checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .disclaimer-checkbox-row input[type="checkbox"] {
      margin-top: 0.2rem;
      flex-shrink: 0;
      width: 1.1rem;
      height: 1.1rem;
      accent-color: var(--color-primary);
      cursor: pointer;
    }

    .disclaimer-checkbox-row label {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--color-text);
      cursor: pointer;
    }

    .disclaimer-widerruf-row label {
      font-weight: 500;
    }

    .disclaimer-accept-btn {
      width: 100%;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .disclaimer-accept-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .disclaimer-accept-btn:not(:disabled):hover {
      background: var(--color-primary-hover, var(--color-primary));
      filter: brightness(1.07);
    }

    .disclaimer-accepted-msg {
      font-size: 0.95rem;
      color: var(--color-primary);
      font-weight: 600;
      text-align: center;
      margin-bottom: 1rem;
    }

    .disclaimer-post-accept {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .disclaimer-post-accept button {
      flex: 1;
      min-width: 160px;
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: filter 0.15s;
    }

    #download-receipt-btn {
      background: var(--color-surface-raised, var(--color-surface));
      border: 1px solid var(--color-border) !important;
      color: var(--color-text);
    }

    #continue-btn {
      background: var(--color-primary);
      color: #fff;
    }

    .disclaimer-post-accept button:hover {
      filter: brightness(1.06);
    }

    .disclaimer-readonly-note {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      background: var(--color-surface-raised, var(--color-surface));
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.9rem;
      margin-top: 1.5rem;
    }

    .disclaimer-footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.875rem;
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .disclaimer-footer a {
      color: var(--color-primary);
      text-decoration: none;
    }

    .disclaimer-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 500px) {
      .disclaimer-card {
        padding: 1.25rem 1rem;
      }
      .disclaimer-post-accept {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<div class="disclaimer-page">

  <!-- Top bar: branding + language selector -->
  <div class="disclaimer-topbar">
    <a class="disclaimer-brand" href="./landing.html" role="banner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true" style="color:var(--color-primary)">
        <path d="M12 2 C14 2 18 6 18 11 C18 17 15 21 12 22 C9 21 6 17 6 11 C6 6 10 2 12 2 Z" fill="currentColor" opacity="0.85"/>
        <path d="M12 3 L12 21" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5" fill="none"/>
        <path d="M12 7 Q15 9 16 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
        <path d="M12 7 Q9 9 8 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
        <path d="M12 12 Q15 14 16 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
        <path d="M12 12 Q9 14 8 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
      </svg>
      <span class="disclaimer-brand-title">Sessions Garden</span>
    </a>

    <div id="globe-container"></div>
    <a id="back-link" class="disclaimer-back-link" href="./landing.html">Back to home</a>
  </div>

  <!-- Main content -->
  <main class="disclaimer-main">
    <div class="disclaimer-card">

      <h1 class="disclaimer-heading" id="disclaimer-heading">Terms of Use</h1>
      <p class="disclaimer-subheading" id="disclaimer-subheading">Please read and accept the following terms before using Sessions Garden.</p>

      <!-- Readonly notice (hidden unless ?readonly=true) -->
      <div class="disclaimer-readonly-note" id="readonly-note" style="display:none"></div>

      <!-- Legal sections — populated by disclaimer.js -->
      <div id="disclaimer-sections"></div>

      <hr class="disclaimer-divider" />

      <!-- Checkboxes + accept button (hidden in readonly mode) -->
      <div class="disclaimer-checkbox-area" id="checkbox-area">

        <!-- General terms checkbox -->
        <div class="disclaimer-checkbox-row">
          <input type="checkbox" id="check-general" name="check-general" />
          <label for="check-general" id="label-general">I have read and accept the Terms of Use.</label>
        </div>

        <!-- Widerrufsrecht / Withdrawal right checkbox — separate and distinct -->
        <div class="disclaimer-checkbox-row disclaimer-widerruf-row">
          <input type="checkbox" id="check-widerruf" name="check-widerruf" />
          <label for="check-widerruf" id="label-widerruf">I agree to the execution of the contract before the expiry of the withdrawal period and acknowledge that my right of withdrawal expires upon commencement of the download/access.</label>
        </div>

      </div><!-- /checkbox-area -->

      <!-- Accept button (visible only before acceptance) -->
      <div id="accept-btn-area">
        <button type="button" class="disclaimer-accept-btn" id="accept-btn" disabled>Accept and Continue</button>
      </div>

      <!-- Post-acceptance state -->
      <p class="disclaimer-accepted-msg" id="accepted-msg" style="display:none"></p>
      <div class="disclaimer-post-accept" id="post-accept-area" style="display:none">
        <button type="button" id="download-receipt-btn">Download Acceptance Receipt</button>
        <button type="button" id="continue-btn">Continue to App</button>
      </div>

    </div><!-- /disclaimer-card -->
  </main>

  <!-- Footer -->
  <footer class="disclaimer-footer" id="disclaimer-footer">
    <a id="footer-terms-link" href="./disclaimer.html?readonly=true">Terms of Use</a>
    <a id="footer-impressum-link" href="./impressum.html">Impressum</a>
    <a id="footer-privacy-link" href="./datenschutz.html">Privacy Policy</a>
  </footer>

</div><!-- /disclaimer-page -->

<script src="./assets/i18n-disclaimer.js"></script>
<script src="./assets/globe-lang.js"></script>
<script src="./assets/disclaimer.js"></script>
<script>
  if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(e){console.warn('SW registration failed:',e)});});}
</script>
</body>
</html>
