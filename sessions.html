<!doctype html>
<html lang="en">
<head>
  <script>
    (function(){try{if(!localStorage.getItem('portfolioTermsAccepted')){var n=encodeURIComponent(window.location.pathname+window.location.search);window.location.replace('./disclaimer.html?next='+n);}}catch(e){}})();
  </script>
  <script>
    (function(){try{if(localStorage.getItem('portfolioTermsAccepted')&&(!localStorage.getItem('portfolioLicenseActivated')||!localStorage.getItem('portfolioLicenseInstance'))){window.location.replace('./license.html');}}catch(e){}})();
  </script>
  <script>
    (function(){try{var t=localStorage.getItem('portfolioTheme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
  </script>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/branding/favicon-32.png">
  <link rel="icon" type="image/x-icon" href="./assets/branding/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/branding/icon-180.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.lemonsqueezy.com; font-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sessions Garden</title>
  <link rel="stylesheet" href="./assets/tokens.css" />
  <link rel="stylesheet" href="./assets/app.css" />
  <link rel="manifest" href="./manifest.json" />
</head>
<body data-nav="sessions">
  <div class="app-shell">
    <div class="container">
      <header class="app-header">
        <a href="./index.html" class="brand brand-link" style="text-decoration:none;color:inherit;">
          <div class="brand-mark">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
              <path d="M12 2 C14 2 18 6 18 11 C18 17 15 21 12 22 C9 21 6 17 6 11 C6 6 10 2 12 2 Z" fill="currentColor" opacity="0.85"/>
              <path d="M12 3 L12 21" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5" fill="none"/>
              <path d="M12 7 Q15 9 16 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
              <path d="M12 7 Q9 9 8 11" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
              <path d="M12 12 Q15 14 16 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
              <path d="M12 12 Q9 14 8 15" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.4" fill="none"/>
            </svg>
          </div>
          <div>
            <div class="brand-title">Sessions Garden</div>
            <div class="brand-subtitle" data-i18n="app.subtitle">Documentation and tracking of therapeutic sessions</div>
          </div>
        </a>
        <div id="nav-placeholder"></div>
        <div class="header-actions">
          <div class="lang-picker">
            <svg class="lang-picker-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <select id="languageSelect" class="select" aria-label="Language">
            <option value="en">English</option>
            <option value="he">עברית</option>
            <option value="de">Deutsch</option>
            <option value="cs">Čeština</option>
          </select>
          </div>
        </div>
      </header>

      <section class="card">
        <h2 class="section-title" data-i18n="sessions.title">Sessions</h2>
        <div class="filter-bar">
          <div class="filter-field">
            <label class="label" data-i18n="sessions.filters.client">Client</label>
            <select class="select-field" id="sessionClientFilter">
              <option value="" data-i18n="sessions.filters.client.placeholder">All clients</option>
            </select>
          </div>
          <div class="filter-field">
            <label class="label" data-i18n="sessions.filters.dateFrom">From</label>
            <input class="input" id="sessionDateFrom" type="date" />
          </div>
          <div class="filter-field">
            <label class="label" data-i18n="sessions.filters.dateTo">To</label>
            <input class="input" id="sessionDateTo" type="date" />
          </div>
          <div class="filter-field">
            <label class="label" data-i18n="sessions.filter.type">Session Type</label>
            <select class="select-field" id="sessionTypeFilter">
              <option value="" data-i18n="sessions.filter.type.all">All Sessions</option>
              <option value="heartShield" data-i18n="sessions.filter.type.heartShield">Heart Shield</option>
              <option value="regular" data-i18n="sessions.filter.type.regular">Regular</option>
            </select>
          </div>
        </div>
        <div id="sessionsEmpty" class="helper-text" data-i18n="sessions.empty" style="display:none;"></div>
        <table class="table sessions-table">
          <thead>
            <tr>
              <th data-i18n="sessions.table.date">Date</th>
              <th data-i18n="sessions.table.client">Client</th>
              <th data-i18n="sessions.table.type">Type</th>
              <th data-i18n="sessions.table.issues">Issues</th>
              <th data-i18n="sessions.table.trapped">Trapped Emotions</th>
              <th data-i18n="sessions.table.heartShield">Heart Shield</th>
              <th data-i18n="sessions.table.actions">Actions</th>
            </tr>
          </thead>
          <tbody id="sessionsTableBody"></tbody>
        </table>
      </section>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="./assets/i18n-en.js"></script>
  <script src="./assets/i18n-he.js"></script>
  <script src="./assets/i18n-de.js"></script>
  <script src="./assets/i18n-cs.js"></script>
  <script src="./assets/i18n.js"></script>
  <script src="./assets/db.js"></script>
  <script src="./assets/app.js"></script>
  <script src="./assets/sessions.js"></script>
  <script>
    if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(e){console.warn('SW registration failed:',e)});});}
  </script>
</body>
</html>
